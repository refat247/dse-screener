# GitHub Actions workflow that auto-scrapes DSE data every 5 minutes during market hours
# and commits it back to the repo. GitHub Pages then serves the updated JSON.

name: DSEX Auto-Scraper

on:
  schedule:
    # BD Market hours: 10:00 AM - 2:30 PM (UTC+6)
    # UTC: 04:00 - 08:30, Sunday-Thursday (BD trading days)
    # Run every 5 minutes during market hours
    - cron: '*/5 4-8 * * 0-4'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install beautifulsoup4 pandas numpy requests lxml
        
    - name: Run scraper
      run: python scraper.py
      env:
        GITHUB_ACTIONS: 'true'
        
    - name: Commit and push updated data
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add dse_data.json
        # Only commit if there are changes
        git diff --cached --quiet || git commit -m "Auto-update DSE data: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        git push
